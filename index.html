<html>
<head>
    <title>Welcome SPIng!</title>
    <style>
        #pi_number {
            font-size:40px;
            font-weight:bold;
            font-family:'Courier New', Courier, monospace;
            color:black;
        }
    </style>
</head>
<body>
    <p id="pi_number">
    </p>
</body>
</html>
<script>
    let decimals = 2;
    document.addEventListener('keydown', function(event) {
        document.getElementById('pi_number').innerText= Math.PI.toFixed(decimals);
        ++decimals;
    });
</script>
